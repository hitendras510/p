<!DOCTYPE html>
<html>
<head>
    <title>EcoNav AI</title>
    <meta charset="utf-8" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 0;
        }

        h2 {
            background: black;
            color: white;
            padding: 10px;
            margin: 0;
            text-align: center;
        }

        #controls {
            padding: 10px;
            background: #f4f4f4;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        select, button {
            padding: 6px;
            font-size: 14px;
        }

        #metrics {
            padding: 10px;
            background: #e8f5e9;
            text-align: center;
        }

        #map {
            height: 75vh;
        }
    </style>
</head>

<body>

<h2>🌍 EcoNav AI - Smart Routing</h2>

<!-- CONTROLS -->
<div id="controls">
    <label>Start:</label>
    <select id="start">
        <option value="A">Delhi</option>
        <option value="B">Jaipur</option>
        <option value="C">Agra</option>
        <option value="D">Varanasi</option>
        <option value="E">Lucknow</option>
        <option value="F">Kolkata</option>
    </select>

    <label>End:</label>
    <select id="end">
        <option value="F">Kolkata</option>
        <option value="E">Lucknow</option>
        <option value="D">Varanasi</option>
        <option value="C">Agra</option>
        <option value="B">Jaipur</option>
        <option value="A">Delhi</option>
    </select>

    <button onclick="loadRoute()">Find Route</button>
</div>

<!-- METRICS -->
<div id="metrics">
    <b>📊 Route Metrics</b><br>
    Eco Distance: <span id="ecoDist">-</span> |
    Eco Pollution: <span id="ecoPoll">-</span> |
    Shortest Pollution: <span id="shortPoll">-</span> |
    Improvement: <span id="improve">-</span>
</div>

<!-- MAP -->
<div id="map"></div>

<script>
const map = L.map('map').setView([26, 80], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

const coords = {
    "A": [28.6139, 77.2090],
    "B": [26.9124, 75.7873],
    "C": [27.1767, 78.0081],
    "D": [25.3176, 82.9739],
    "E": [26.8467, 80.9462],
    "F": [22.5726, 88.3639]
};

let layers = [];

function clearMap() {
    layers.forEach(l => map.removeLayer(l));
    layers = [];
}

//////////////////////////////////////////////////
// ✅ CORRECT OSRM (SINGLE CALL)
//////////////////////////////////////////////////
async function getFullRealRoute(path) {
    const coordString = path.map(city => {
        const c = coords[city];
        return `${c[1]},${c[0]}`;
    }).join(";");

    const url = `https://router.project-osrm.org/route/v1/driving/${coordString}?overview=full&geometries=geojson`;

    const res = await fetch(url);
    const data = await res.json();

    return data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
}

//////////////////////////////////////////////////
// 🚗 VEHICLE ANIMATION
//////////////////////////////////////////////////
function animateRoute(routeCoords) {
    let i = 0;

    const marker = L.circleMarker(routeCoords[0], {
        radius: 8,
        color: "blue",
        fillColor: "blue",
        fillOpacity: 1
    }).addTo(map);

    layers.push(marker);

    function move() {
        if (i >= routeCoords.length) return;

        marker.setLatLng(routeCoords[i]);
        i++;

        setTimeout(move, 30);
    }

    move();
}

//////////////////////////////////////////////////
// ✨ DRAW ANIMATED ROUTE
//////////////////////////////////////////////////
async function drawRealRoute(path, color) {
    const fullRoute = await getFullRealRoute(path);

    let drawn = [];

    const line = L.polyline([], {
        color: color,
        weight: color === "green" ? 10 : 4,
        opacity: color === "green" ? 0.9 : 0.5
    }).addTo(map);

    layers.push(line);

    for (let i = 0; i < fullRoute.length; i++) {
        drawn.push(fullRoute[i]);
        line.setLatLngs(drawn);

        await new Promise(r => setTimeout(r, 5));
    }

    map.fitBounds(line.getBounds());

    // animate eco route
    if (color === "green") {
        animateRoute(fullRoute);
    }

    // markers
    path.forEach(city => {
        const marker = L.marker(coords[city])
            .addTo(map)
            .bindPopup(city);

        layers.push(marker);
    });
}

//////////////////////////////////////////////////
// 🚀 MAIN
//////////////////////////////////////////////////
async function loadRoute() {
    const start = document.getElementById("start").value;
    const end = document.getElementById("end").value;

    clearMap();

    try {
        const res = await fetch("http://127.0.0.1:8000/eco-route", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ start, end })
        });

        const data = await res.json();

        await drawRealRoute(data.shortest_route, "red");
        await drawRealRoute(data.route, "green");

        document.getElementById("ecoDist").innerText = data.total_distance;
        document.getElementById("ecoPoll").innerText = data.total_pollution;
        document.getElementById("shortPoll").innerText = data.shortest_exposure;
        document.getElementById("improve").innerText = data.improvement;

    } catch (err) {
        console.error(err);
        alert("Error loading route");
    }
}

// auto load
loadRoute();
</script>

</body>
</html>
